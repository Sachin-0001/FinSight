# OpenEnv manifest — see https://github.com/meta-pytorch/OpenEnv
spec_version: 1
name: financial-doc-env
version: "1.0.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >-
  Synthetic financial documents (transaction logs, income statements, balance sheets) with
  deterministic programmatic graders for anomaly triage, KPI extraction, and compliance flagging.
tags:
  - openenv
  - finance
  - document-analysis
  - compliance
  - real-world
tasks:
  - name: anomaly_classification
    difficulty: easy
  - name: kpi_extraction
    difficulty: medium
  - name: compliance_assessment
    difficulty: hard
hardware: cpu-basic
sdk: docker
